<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Style for the stats cards */
        .stat-card {
            margin: 20px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="my-4">Student Dashboard</h1>
        <div class="row">
            <!-- Stats Cards -->
            <div class="col-md-3 stat-card">
                <h5>Courses Enrolled</h5>
                <h2>5</h2>
            </div>
            <div class="col-md-3 stat-card">
                <h5>CGPA</h5>
                <h2>3.8</h2>
            </div>
            <div class="col-md-3 stat-card">
                <h5>Learning Streak</h5>
                <h2>15 Days</h2>
            </div>
            <div class="col-md-3 stat-card">
                <h5>Recommendations</h5>
                <h2>3</h2>
            </div>
        </div>
        <hr>
        <h2 class="my-4">Profile Section</h2>
        <div class="card stat-card">
            <div class="card-body">
                <h5>Name: John Doe</h5>
                <h5>Email: john.doe@example.com</h5>
                <h5>Major: Computer Science</h5>
            </div>
        </div>
        <hr>
        <h2 class="my-4">Enrollments</h2>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Progress</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Intro to Programming</td>
                    <td>
                        <div class="progress">
                            <div class="progress-bar" style="width: 70%;">70%</div>
                        </div>
                    </td>
                    <td><button class="btn btn-primary">Continue</button></td>
                </tr>
                <tr>
                    <td>Data Structures</td>
                    <td>
                        <div class="progress">
                            <div class="progress-bar" style="width: 50%;">50%</div>
                        </div>
                    </td>
                    <td><button class="btn btn-primary">Continue</button></td>
                </tr>
                <tr>
                    <td>Web Development</td>
                    <td>
                        <div class="progress">
                            <div class="progress-bar" style="width: 30%;">30%</div>
                        </div>
                    </td>
                    <td><button class="btn btn-primary">Continue</button></td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
