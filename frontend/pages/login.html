<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <h2>🎓 Course Recommender</h2>
        <p class="subtitle">Login to get AI-powered course recommendations</p>

        <!-- Error Alert -->
        <div class="alert alert-error" id="errorAlert"></div>

        <!-- Login Form -->
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
        </div>

        <button class="btn btn-primary" onclick="login()">Login</button>

        <div class="auth-link">
          Don't have an account? <a href="register.html">Register here</a>
        </div>
      </div>
    </div>

    <script>
      const API = 'http://localhost:5000/api'

      // If already logged in → redirect to dashboard
      if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html'
      }

      async function login() {
        const email = document.getElementById('email').value
        const password = document.getElementById('password').value
        const errorAlert = document.getElementById('errorAlert')

        // Basic validation
        if (!email || !password) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Please fill in all fields'
          return
        }

        try {
          const response = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          })

          const data = await response.json()

          if (!response.ok) {
            errorAlert.style.display = 'block'
            errorAlert.textContent = data.message
            return
          }

          // Save token and student info to localStorage
          // Save token and student info to localStorage
          localStorage.setItem('token', data.token)
          localStorage.setItem('studentName', data.name)
          localStorage.setItem('studentId', data._id)
          localStorage.setItem('userRole', data.role)

          // Redirect based on role
          if (data.role === 'admin') {
            window.location.href = 'admin-dashboard.html'
          } else {
            window.location.href = 'dashboard.html'
          }
        } catch (error) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Server error. Make sure backend is running.'
        }
      }

      // Allow pressing Enter to login
      document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login()
      })
    </script>
  </body>
</html>
