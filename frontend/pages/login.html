<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="page-auth page-login">
    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-logo">
          <div class="logo-icon">Course Recommender</div>
        </div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to continue to your course recommendations</p>

        <div class="alert alert-error" id="errorAlert"></div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
        </div>

        <button class="btn btn-primary" onclick="login()">Login</button>

        <div class="auth-link">
          Do not have an account?
          <a href="frontend/pages/register.html">Register here</a>
        </div>
      </div>
    </div>

    <script>
      const API =
        'https://courserecommendationsystem-production-74ab.up.railway.app/api'

      if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html'
      }

      async function login() {
        const email = document.getElementById('email').value.trim()
        const password = document.getElementById('password').value
        const errorAlert = document.getElementById('errorAlert')

        errorAlert.style.display = 'none'

        if (!email || !password) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Please fill in all fields.'
          return
        }

        try {
          const response = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          })

          const data = await response.json()

          if (!response.ok) {
            errorAlert.style.display = 'block'
            errorAlert.textContent = data.message || 'Login failed.'
            return
          }

          localStorage.setItem('token', data.token)
          localStorage.setItem('studentName', data.name)
          localStorage.setItem('studentId', data._id)
          localStorage.setItem('userRole', data.role)

          if (data.role === 'admin') {
            window.location.href = 'admin-dashboard.html'
          } else {
            window.location.href = 'dashboard.html'
          }
        } catch (error) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Server error. Make sure backend is running.'
        }
      }

      document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') login()
      })
    </script>
  </body>
</html>
