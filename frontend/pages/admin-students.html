<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Students - Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .nav-toggle {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        cursor: pointer;
        padding: 8px;
        z-index: 200;
      }
      .nav-toggle span {
        display: block;
        width: 20px;
        height: 2px;
        background: #f1f5f9;
        border-radius: 2px;
        transition: all 0.3s ease;
      }
      .nav-toggle.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-toggle.open span:nth-child(2) {
        opacity: 0;
      }
      .nav-toggle.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }
      @media (max-width: 768px) {
        .navbar {
          flex-wrap: wrap;
          height: auto !important;
          padding: 14px 20px !important;
          gap: 0;
          position: relative;
        }
        .nav-toggle {
          display: flex;
        }
        .nav-links {
          display: none;
          flex-direction: column;
          width: 100%;
          gap: 4px !important;
          padding: 12px 0 4px;
          align-items: flex-start !important;
          flex-wrap: nowrap !important;
          justify-content: flex-start !important;
        }
        .nav-links.open {
          display: flex;
        }
        .navbar .nav-links a,
        .navbar .nav-links .btn-logout {
          width: 100%;
          padding: 10px 14px !important;
          border-radius: 8px !important;
          font-size: 14px !important;
        }
        .navbar .nav-name {
          width: 100%;
          padding: 6px 14px;
          font-size: 13px;
          color: #94a3b8;
        }
      }
    </style>
  </head>
  <body class="page-admin page-admin-students">
    <div class="navbar">
      <span class="logo">Admin Panel</span>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-courses.html">Courses</a>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard content-stack">
      <div class="page-header">
        <h1>All Students</h1>
        <p class="subtitle">View and manage registered students</p>
      </div>

      <section class="glass-panel admin-search-wrap">
        <div class="search-panel">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by name, email, or student ID"
            oninput="filterStudents()"
          />
          <span id="studentCount" class="search-count">Loading...</span>
        </div>
      </section>

      <section class="glass-panel admin-students-wrap">
        <div id="studentsList">
          <p class="empty-text">Loading students...</p>
        </div>
      </section>
    </div>

    <script>
      const API =
        'https://courserecommendationsystem-production-74ab.up.railway.app/api'
      const token = localStorage.getItem('token')
      if (!token) window.location.href = 'login.html'

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      let allStudents = []

      window.onload = () => loadStudents()

      async function loadStudents() {
        try {
          const res = await fetch(`${API}/admin/students`, { headers })
          const data = await res.json()

          if (!res.ok) {
            document.getElementById('studentsList').innerHTML =
              `<p class="error-text">${data.message}</p>`
            return
          }

          allStudents = data
          document.getElementById('studentCount').textContent =
            `${data.length} students`
          renderStudents(data)
        } catch (error) {
          document.getElementById('studentsList').innerHTML =
            '<p class="error-text">Error loading students.</p>'
        }
      }

      function cgpaClass(value) {
        if (value >= 3.5) return 'cgpa-high'
        if (value >= 2.5) return 'cgpa-mid'
        return 'cgpa-low'
      }

      function renderStudents(students) {
        const list = document.getElementById('studentsList')

        if (students.length === 0) {
          list.innerHTML = '<p class="empty-text">No students found.</p>'
          return
        }

        list.innerHTML = ''
        students.forEach((student) => {
          const cgpa = Number.parseFloat(student.cgpa) || 0
          list.innerHTML += `
            <div class="student-row">
              <div class="student-profile">
                <div class="avatar-initial">${student.name.charAt(0).toUpperCase()}</div>
                <div>
                  <p class="row-title">${student.name}</p>
                  <p class="row-meta">${student.email}</p>
                </div>
              </div>
              <div class="student-cell">
                <p class="label">Student ID</p>
                <p class="value">${student.studentId}</p>
              </div>
              <div class="student-cell">
                <p class="label">Department</p>
                <p class="value">${student.department}</p>
              </div>
              <div class="student-cell">
                <p class="label">Semester</p>
                <p class="value">${student.semester}</p>
              </div>
              <div class="student-cell">
                <p class="label">CGPA</p>
                <p class="value ${cgpaClass(cgpa)}">${cgpa.toFixed(2)}</p>
              </div>
              <div class="student-cell career-goal-cell">
                <p class="label">Career Goal</p>
                <p class="value">${student.careerGoal || '-'}</p>
              </div>
              <div class="row-actions">
                <button
                  class="admin-action-btn btn-delete"
                  onclick="deleteStudent('${student._id}', '${student.name}')"
                >
                  Delete
                </button>
              </div>
            </div>
          `
        })
      }

      function filterStudents() {
        const query = document.getElementById('searchInput').value.toLowerCase()
        const filtered = allStudents.filter(
          (s) =>
            s.name.toLowerCase().includes(query) ||
            s.email.toLowerCase().includes(query) ||
            s.studentId.toLowerCase().includes(query),
        )
        document.getElementById('studentCount').textContent =
          `${filtered.length} students`
        renderStudents(filtered)
      }

      async function deleteStudent(id, name) {
        if (!confirm(`Are you sure you want to delete ${name}?`)) return

        const res = await fetch(`${API}/admin/students/${id}`, {
          method: 'DELETE',
          headers,
        })

        if (res.ok) loadStudents()
      }

      function toggleNav() {
        const nav = document.getElementById('navLinks')
        const btn = document.querySelector('.nav-toggle')
        nav.classList.toggle('open')
        btn.classList.toggle('open')
      }
      // Close nav when clicking outside
      document.addEventListener('click', function (e) {
        const nav = document.getElementById('navLinks')
        const btn = document.querySelector('.nav-toggle')
        if (nav && btn && !nav.contains(e.target) && !btn.contains(e.target)) {
          nav.classList.remove('open')
          btn.classList.remove('open')
        }
      })

      function logout() {
        localStorage.removeItem('token')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
