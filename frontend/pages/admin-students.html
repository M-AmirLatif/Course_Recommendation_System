<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Students - Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="page-admin page-admin-students">
    <div class="navbar">
      <span class="logo">Admin Panel</span>
      <div class="nav-links">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-courses.html">Courses</a>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard content-stack">
      <div class="page-header">
        <h1>All Students</h1>
        <p class="subtitle">View and manage registered students</p>
      </div>

      <section class="glass-panel admin-search-wrap">
        <div class="search-panel">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by name, email, or student ID"
            oninput="filterStudents()"
          />
          <span id="studentCount" class="search-count">Loading...</span>
        </div>
      </section>

      <section class="glass-panel admin-students-wrap">
        <div id="studentsList">
          <p class="empty-text">Loading students...</p>
        </div>
      </section>
    </div>

    <script>
      const API = 'http://localhost:5000/api'
      const token = localStorage.getItem('token')
      if (!token) window.location.href = 'login.html'

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      let allStudents = []

      window.onload = () => loadStudents()

      async function loadStudents() {
        try {
          const res = await fetch(`${API}/admin/students`, { headers })
          const data = await res.json()

          if (!res.ok) {
            document.getElementById('studentsList').innerHTML =
              `<p class="error-text">${data.message}</p>`
            return
          }

          allStudents = data
          document.getElementById('studentCount').textContent =
            `${data.length} students`
          renderStudents(data)
        } catch (error) {
          document.getElementById('studentsList').innerHTML =
            '<p class="error-text">Error loading students.</p>'
        }
      }

      function cgpaClass(value) {
        if (value >= 3.5) return 'cgpa-high'
        if (value >= 2.5) return 'cgpa-mid'
        return 'cgpa-low'
      }

      function renderStudents(students) {
        const list = document.getElementById('studentsList')

        if (students.length === 0) {
          list.innerHTML = '<p class="empty-text">No students found.</p>'
          return
        }

        list.innerHTML = ''
        students.forEach((student) => {
          const cgpa = Number.parseFloat(student.cgpa) || 0
          list.innerHTML += `
            <div class="student-row">
              <div class="student-profile">
                <div class="avatar-initial">${student.name.charAt(0).toUpperCase()}</div>
                <div>
                  <p class="row-title">${student.name}</p>
                  <p class="row-meta">${student.email}</p>
                </div>
              </div>
              <div class="student-cell">
                <p class="label">Student ID</p>
                <p class="value">${student.studentId}</p>
              </div>
              <div class="student-cell">
                <p class="label">Department</p>
                <p class="value">${student.department}</p>
              </div>
              <div class="student-cell">
                <p class="label">Semester</p>
                <p class="value">${student.semester}</p>
              </div>
              <div class="student-cell">
                <p class="label">CGPA</p>
                <p class="value ${cgpaClass(cgpa)}">${cgpa.toFixed(2)}</p>
              </div>
              <div class="student-cell career-goal-cell">
                <p class="label">Career Goal</p>
                <p class="value">${student.careerGoal || '-'}</p>
              </div>
              <div class="row-actions">
                <button
                  class="admin-action-btn btn-delete"
                  onclick="deleteStudent('${student._id}', '${student.name}')"
                >
                  Delete
                </button>
              </div>
            </div>
          `
        })
      }

      function filterStudents() {
        const query = document.getElementById('searchInput').value.toLowerCase()
        const filtered = allStudents.filter(
          (s) =>
            s.name.toLowerCase().includes(query) ||
            s.email.toLowerCase().includes(query) ||
            s.studentId.toLowerCase().includes(query),
        )
        document.getElementById('studentCount').textContent =
          `${filtered.length} students`
        renderStudents(filtered)
      }

      async function deleteStudent(id, name) {
        if (!confirm(`Are you sure you want to delete ${name}?`)) return

        const res = await fetch(`${API}/admin/students/${id}`, {
          method: 'DELETE',
          headers,
        })

        if (res.ok) loadStudents()
      }

      function logout() {
        localStorage.removeItem('token')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
