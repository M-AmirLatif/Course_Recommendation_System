<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Courses - Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .nav-toggle {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        cursor: pointer;
        padding: 8px;
        z-index: 200;
      }
      .nav-toggle span {
        display: block;
        width: 20px;
        height: 2px;
        background: #f1f5f9;
        border-radius: 2px;
        transition: all 0.3s ease;
      }
      .nav-toggle.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-toggle.open span:nth-child(2) {
        opacity: 0;
      }
      .nav-toggle.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }
      @media (max-width: 768px) {
        .navbar {
          flex-wrap: wrap;
          height: auto !important;
          padding: 14px 20px !important;
          gap: 0;
          position: relative;
        }
        .nav-toggle {
          display: flex;
        }
        .nav-links {
          display: none;
          flex-direction: column;
          width: 100%;
          gap: 4px !important;
          padding: 12px 0 4px;
          align-items: flex-start !important;
          flex-wrap: nowrap !important;
          justify-content: flex-start !important;
        }
        .nav-links.open {
          display: flex;
        }
        .navbar .nav-links a,
        .navbar .nav-links .btn-logout {
          width: 100%;
          padding: 10px 14px !important;
          border-radius: 8px !important;
          font-size: 14px !important;
        }
        .navbar .nav-name {
          width: 100%;
          padding: 6px 14px;
          font-size: 13px;
          color: #94a3b8;
        }
      }
    </style>
  </head>
  <body class="page-admin page-admin-courses">
    <div class="navbar">
      <span class="logo">Admin Panel</span>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-students.html">Students</a>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard content-stack">
      <div class="page-header">
        <h1>Manage Courses</h1>
        <p class="subtitle">Add, edit, and maintain the course catalog</p>
      </div>

      <section class="glass-panel admin-courses-form">
        <h2 id="formTitle">Add New Course</h2>

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label for="courseCode">Course Code</label>
            <input type="text" id="courseCode" placeholder="CS301" />
          </div>
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Machine Learning" />
          </div>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <input
            type="text"
            id="description"
            placeholder="Brief course description"
          />
        </div>

        <div class="form-grid form-grid-3">
          <div class="form-group">
            <label for="department">Department</label>
            <input type="text" id="department" placeholder="Computer Science" />
          </div>
          <div class="form-group">
            <label for="creditHours">Credit Hours</label>
            <input
              type="number"
              id="creditHours"
              placeholder="3"
              min="1"
              max="6"
            />
          </div>
          <div class="form-group">
            <label for="difficultyLevel">Difficulty Level</label>
            <select id="difficultyLevel">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>

        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label for="successRate">Success Rate (%)</label>
            <input
              type="number"
              id="successRate"
              placeholder="85"
              min="0"
              max="100"
            />
          </div>
          <div class="form-group">
            <label for="averageRating">Average Rating (0-5)</label>
            <input
              type="number"
              id="averageRating"
              placeholder="4.5"
              min="0"
              max="5"
              step="0.1"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="tags">Tags (comma separated)</label>
          <input
            type="text"
            id="tags"
            placeholder="AI, Python, Machine Learning"
          />
        </div>

        <div class="form-group">
          <label for="careerOutcomes">Career Outcomes (comma separated)</label>
          <input
            type="text"
            id="careerOutcomes"
            placeholder="Data Scientist, ML Engineer"
          />
        </div>

        <div class="form-group">
          <label for="skillsGained">Skills Gained (comma separated)</label>
          <input
            type="text"
            id="skillsGained"
            placeholder="Python, TensorFlow, Statistics"
          />
        </div>

        <div class="button-row">
          <button class="btn btn-primary btn-auto" onclick="saveCourse()">
            Save Course
          </button>
          <button class="btn btn-secondary btn-auto" onclick="resetForm()">
            Cancel
          </button>
        </div>
      </section>

      <section class="glass-panel admin-courses-list">
        <h2>All Courses</h2>
        <div id="coursesList">
          <p class="empty-text">Loading courses...</p>
        </div>
      </section>
    </div>

    <script>
      const API =
        'https://courserecommendationsystem-production-0a2d.up.railway.app/api'
      const token = localStorage.getItem('token')
      if (!token) window.location.href = 'login.html'

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      let editingCourseId = null

      window.onload = () => loadCourses()

      function difficultyClass(value) {
        if (value === 'beginner') return 'diff-beginner'
        if (value === 'intermediate') return 'diff-intermediate'
        return 'diff-advanced'
      }

      function difficultyLabel(value) {
        return (value || '').charAt(0).toUpperCase() + (value || '').slice(1)
      }

      async function loadCourses() {
        const res = await fetch(`${API}/courses`, { headers })
        const courses = await res.json()

        const list = document.getElementById('coursesList')
        if (!Array.isArray(courses) || courses.length === 0) {
          list.innerHTML = '<p class="empty-text">No courses available.</p>'
          return
        }

        list.innerHTML = ''

        courses.forEach((course) => {
          const tags = (course.tags || []).join(', ') || 'No tags'
          list.innerHTML += `
            <div class="data-row">
              <div class="data-main">
                <p class="row-title">${course.title}</p>
                <div class="course-inline-meta">
                  <span><strong>${course.courseCode}</strong></span>
                  <span class="${difficultyClass(course.difficultyLevel)}">${difficultyLabel(course.difficultyLevel)}</span>
                  <span>Rating ${course.averageRating ?? '-'}/5</span>
                  <span>Success ${course.successRate ?? '-'}%</span>
                </div>
                <p class="row-meta">Tags: ${tags}</p>
              </div>
              <div class="row-actions">
                <button class="admin-action-btn btn-edit" onclick="editCourse('${course._id}')">
                  Edit
                </button>
                <button class="admin-action-btn btn-delete" onclick="deleteCourse('${course._id}')">
                  Delete
                </button>
              </div>
            </div>
          `
        })
      }

      async function saveCourse() {
        const errorAlert = document.getElementById('errorAlert')
        const successAlert = document.getElementById('successAlert')
        errorAlert.style.display = 'none'
        successAlert.style.display = 'none'

        const courseData = {
          courseCode: document.getElementById('courseCode').value.trim(),
          title: document.getElementById('title').value.trim(),
          description: document.getElementById('description').value.trim(),
          department: document.getElementById('department').value.trim(),
          creditHours: parseInt(
            document.getElementById('creditHours').value,
            10,
          ),
          difficultyLevel: document.getElementById('difficultyLevel').value,
          successRate: parseFloat(document.getElementById('successRate').value),
          averageRating: parseFloat(
            document.getElementById('averageRating').value,
          ),
          tags: document
            .getElementById('tags')
            .value.split(',')
            .map((t) => t.trim())
            .filter((t) => t),
          careerOutcomes: document
            .getElementById('careerOutcomes')
            .value.split(',')
            .map((t) => t.trim())
            .filter((t) => t),
          skillsGained: document
            .getElementById('skillsGained')
            .value.split(',')
            .map((t) => t.trim())
            .filter((t) => t),
        }

        try {
          let res
          if (editingCourseId) {
            res = await fetch(`${API}/courses/${editingCourseId}`, {
              method: 'PUT',
              headers,
              body: JSON.stringify(courseData),
            })
          } else {
            res = await fetch(`${API}/courses`, {
              method: 'POST',
              headers,
              body: JSON.stringify(courseData),
            })
          }

          const data = await res.json()

          if (!res.ok) {
            errorAlert.style.display = 'block'
            errorAlert.textContent = data.message || 'Unable to save course.'
            return
          }

          successAlert.style.display = 'block'
          successAlert.textContent = editingCourseId
            ? 'Course updated successfully.'
            : 'Course added successfully.'

          resetForm()
          loadCourses()
        } catch (error) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Server error.'
        }
      }

      async function editCourse(id) {
        const res = await fetch(`${API}/courses/${id}`, { headers })
        const course = await res.json()

        document.getElementById('courseCode').value = course.courseCode
        document.getElementById('title').value = course.title
        document.getElementById('description').value = course.description
        document.getElementById('department').value = course.department
        document.getElementById('creditHours').value = course.creditHours
        document.getElementById('difficultyLevel').value =
          course.difficultyLevel
        document.getElementById('successRate').value = course.successRate
        document.getElementById('averageRating').value = course.averageRating
        document.getElementById('tags').value = (course.tags || []).join(', ')
        document.getElementById('careerOutcomes').value = (
          course.careerOutcomes || []
        ).join(', ')
        document.getElementById('skillsGained').value = (
          course.skillsGained || []
        ).join(', ')

        editingCourseId = id
        document.getElementById('formTitle').textContent = 'Edit Course'
        window.scrollTo({ top: 0, behavior: 'smooth' })
      }

      async function deleteCourse(id) {
        if (!confirm('Are you sure you want to delete this course?')) return

        const res = await fetch(`${API}/courses/${id}`, {
          method: 'DELETE',
          headers,
        })

        if (res.ok) loadCourses()
      }

      function resetForm() {
        editingCourseId = null
        document.getElementById('formTitle').textContent = 'Add New Course'
        document.getElementById('courseCode').value = ''
        document.getElementById('title').value = ''
        document.getElementById('description').value = ''
        document.getElementById('department').value = ''
        document.getElementById('creditHours').value = ''
        document.getElementById('difficultyLevel').value = 'beginner'
        document.getElementById('successRate').value = ''
        document.getElementById('averageRating').value = ''
        document.getElementById('tags').value = ''
        document.getElementById('careerOutcomes').value = ''
        document.getElementById('skillsGained').value = ''
      }

      function toggleNav() {
        const nav = document.getElementById('navLinks')
        const btn = document.querySelector('.nav-toggle')
        nav.classList.toggle('open')
        btn.classList.toggle('open')
      }
      // Close nav when clicking outside
      document.addEventListener('click', function (e) {
        const nav = document.getElementById('navLinks')
        const btn = document.querySelector('.nav-toggle')
        if (nav && btn && !nav.contains(e.target) && !btn.contains(e.target)) {
          nav.classList.remove('open')
          btn.classList.remove('open')
        }
      })

      function logout() {
        localStorage.removeItem('token')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
