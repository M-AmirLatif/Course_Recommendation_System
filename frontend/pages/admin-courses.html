<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Courses — Admin</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <span class="logo">⚙️ Admin Panel</span>
      <div>
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-students.html">Students</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard">
      <h1>📚 Manage Courses</h1>
      <p class="subtitle">Add, edit or delete courses</p>

      <!-- ADD COURSE FORM -->
      <div
        style="
          background: white;
          padding: 25px;
          border-radius: 12px;
          box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
          margin-bottom: 30px;
        "
      >
        <h2 style="margin-bottom: 20px; color: #1a1a2e" id="formTitle">
          + Add New Course
        </h2>

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
          <div class="form-group">
            <label>Course Code</label>
            <input type="text" id="courseCode" placeholder="CS301" />
          </div>
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="title" placeholder="Machine Learning" />
          </div>
        </div>

        <div class="form-group">
          <label>Description</label>
          <input
            type="text"
            id="description"
            placeholder="Brief course description"
          />
        </div>

        <div
          style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px"
        >
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="department" placeholder="Computer Science" />
          </div>
          <div class="form-group">
            <label>Credit Hours</label>
            <input
              type="number"
              id="creditHours"
              placeholder="3"
              min="1"
              max="6"
            />
          </div>
          <div class="form-group">
            <label>Difficulty Level</label>
            <select id="difficultyLevel">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
          <div class="form-group">
            <label>Success Rate (%)</label>
            <input
              type="number"
              id="successRate"
              placeholder="85"
              min="0"
              max="100"
            />
          </div>
          <div class="form-group">
            <label>Average Rating (0-5)</label>
            <input
              type="number"
              id="averageRating"
              placeholder="4.5"
              min="0"
              max="5"
              step="0.1"
            />
          </div>
        </div>

        <div class="form-group">
          <label>Tags (comma separated)</label>
          <input
            type="text"
            id="tags"
            placeholder="AI, Python, Machine Learning"
          />
        </div>

        <div class="form-group">
          <label>Career Outcomes (comma separated)</label>
          <input
            type="text"
            id="careerOutcomes"
            placeholder="Data Scientist, ML Engineer"
          />
        </div>

        <div class="form-group">
          <label>Skills Gained (comma separated)</label>
          <input
            type="text"
            id="skillsGained"
            placeholder="Python, TensorFlow, Statistics"
          />
        </div>

        <div style="display: flex; gap: 10px">
          <button
            class="btn btn-primary"
            onclick="saveCourse()"
            style="width: auto; padding: 12px 30px"
          >
            Save Course
          </button>
          <button
            onclick="resetForm()"
            style="
              background: #f0f0f0;
              border: none;
              padding: 12px 30px;
              border-radius: 8px;
              cursor: pointer;
              font-size: 14px;
            "
          >
            Cancel
          </button>
        </div>
      </div>

      <!-- COURSES LIST -->
      <div
        style="
          background: white;
          padding: 25px;
          border-radius: 12px;
          box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        "
      >
        <h2 style="margin-bottom: 20px; color: #1a1a2e">All Courses</h2>
        <div id="coursesList">
          <p style="color: #888">Loading courses...</p>
        </div>
      </div>
    </div>

    <script>
      const API = 'http://localhost:5000/api'
      const token = localStorage.getItem('token')
      if (!token) window.location.href = 'login.html'

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      let editingCourseId = null

      window.onload = () => loadCourses()

      async function loadCourses() {
        const res = await fetch(`${API}/courses`, { headers })
        const courses = await res.json()

        const list = document.getElementById('coursesList')
        list.innerHTML = ''

        courses.forEach((course) => {
          list.innerHTML += `
          <div style="display:flex; justify-content:space-between;
                      align-items:center; padding:15px;
                      border-bottom:1px solid #f0f0f0;">
            <div>
              <p style="font-weight:700;">${course.title}</p>
              <p style="color:#888; font-size:13px;">
                ${course.courseCode} • ${course.difficultyLevel} • 
                ⭐${course.averageRating} • 📈${course.successRate}%
              </p>
              <p style="color:#aaa; font-size:12px; margin-top:3px;">
                Tags: ${course.tags.join(', ')}
              </p>
            </div>
            <div style="display:flex; gap:8px;">
              <button onclick="editCourse('${course._id}')"
                style="background:#f39c12; color:white; border:none;
                       padding:8px 15px; border-radius:8px; cursor:pointer;">
                ✏️ Edit
              </button>
              <button onclick="deleteCourse('${course._id}')"
                style="background:#e74c3c; color:white; border:none;
                       padding:8px 15px; border-radius:8px; cursor:pointer;">
                🗑️ Delete
              </button>
            </div>
          </div>
        `
        })
      }

      async function saveCourse() {
        const errorAlert = document.getElementById('errorAlert')
        const successAlert = document.getElementById('successAlert')
        errorAlert.style.display = 'none'
        successAlert.style.display = 'none'

        const courseData = {
          courseCode: document.getElementById('courseCode').value,
          title: document.getElementById('title').value,
          description: document.getElementById('description').value,
          department: document.getElementById('department').value,
          creditHours: parseInt(document.getElementById('creditHours').value),
          difficultyLevel: document.getElementById('difficultyLevel').value,
          successRate: parseFloat(document.getElementById('successRate').value),
          averageRating: parseFloat(
            document.getElementById('averageRating').value,
          ),
          tags: document
            .getElementById('tags')
            .value.split(',')
            .map((t) => t.trim())
            .filter((t) => t),
          careerOutcomes: document
            .getElementById('careerOutcomes')
            .value.split(',')
            .map((t) => t.trim())
            .filter((t) => t),
          skillsGained: document
            .getElementById('skillsGained')
            .value.split(',')
            .map((t) => t.trim())
            .filter((t) => t),
        }

        try {
          let res
          if (editingCourseId) {
            // Update existing course
            res = await fetch(`${API}/courses/${editingCourseId}`, {
              method: 'PUT',
              headers,
              body: JSON.stringify(courseData),
            })
          } else {
            // Create new course
            res = await fetch(`${API}/courses`, {
              method: 'POST',
              headers,
              body: JSON.stringify(courseData),
            })
          }

          const data = await res.json()

          if (!res.ok) {
            errorAlert.style.display = 'block'
            errorAlert.textContent = data.message
            return
          }

          successAlert.style.display = 'block'
          successAlert.textContent = editingCourseId
            ? 'Course updated successfully!'
            : 'Course added successfully!'

          resetForm()
          loadCourses()
        } catch (error) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Server error!'
        }
      }

      async function editCourse(id) {
        const res = await fetch(`${API}/courses/${id}`, { headers })
        const course = await res.json()

        // Fill form with course data
        document.getElementById('courseCode').value = course.courseCode
        document.getElementById('title').value = course.title
        document.getElementById('description').value = course.description
        document.getElementById('department').value = course.department
        document.getElementById('creditHours').value = course.creditHours
        document.getElementById('difficultyLevel').value =
          course.difficultyLevel
        document.getElementById('successRate').value = course.successRate
        document.getElementById('averageRating').value = course.averageRating
        document.getElementById('tags').value = course.tags.join(', ')
        document.getElementById('careerOutcomes').value =
          course.careerOutcomes.join(', ')
        document.getElementById('skillsGained').value =
          course.skillsGained.join(', ')

        editingCourseId = id
        document.getElementById('formTitle').textContent = '✏️ Edit Course'

        // Scroll to form
        window.scrollTo({ top: 0, behavior: 'smooth' })
      }

      async function deleteCourse(id) {
        if (!confirm('Are you sure you want to delete this course?')) return

        const res = await fetch(`${API}/courses/${id}`, {
          method: 'DELETE',
          headers,
        })

        if (res.ok) {
          loadCourses()
        }
      }

      function resetForm() {
        editingCourseId = null
        document.getElementById('formTitle').textContent = '+ Add New Course'
        document.getElementById('courseCode').value = ''
        document.getElementById('title').value = ''
        document.getElementById('description').value = ''
        document.getElementById('department').value = ''
        document.getElementById('creditHours').value = ''
        document.getElementById('difficultyLevel').value = 'beginner'
        document.getElementById('successRate').value = ''
        document.getElementById('averageRating').value = ''
        document.getElementById('tags').value = ''
        document.getElementById('careerOutcomes').value = ''
        document.getElementById('skillsGained').value = ''
      }

      function logout() {
        localStorage.removeItem('token')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
