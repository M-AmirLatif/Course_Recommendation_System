<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Degree Recommendations - Degree Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/runtime-config.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/notifications.js"></script>
    <style>
      .rec-card {
        background: linear-gradient(
          155deg,
          rgba(11, 23, 49, 0.85),
          rgba(24, 41, 71, 0.65)
        );
        border: 1px solid rgba(133, 158, 196, 0.25);
        border-radius: 18px;
        padding: 24px;
        margin-bottom: 16px;
        position: relative;
        overflow: hidden;
        transition: all 0.25s ease;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .page-recommendations .rec-card {
        display: flex;
        flex-direction: column;
        grid-template-columns: none;
        align-items: stretch;
      }
      .rec-top {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .rec-body {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px;
        gap: 18px;
        align-items: start;
      }
      .rec-main {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }
      .rec-side {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .rec-side .breakdown-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .enroll-count {
        font-size: 12px;
        color: var(--text-muted);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .rec-card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: linear-gradient(180deg, #60a5fa, #22d3ee);
      }
      .rec-card:hover {
        transform: translateX(4px);
        border-color: rgba(96, 165, 250, 0.45);
        box-shadow: 0 14px 32px rgba(2, 8, 28, 0.4);
      }
      .rec-header {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        flex-wrap: wrap;
      }
      .rec-rank {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Poppins', sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #eef5ff;
        background: linear-gradient(
          145deg,
          rgba(59, 130, 246, 0.35),
          rgba(99, 102, 241, 0.28)
        );
        border: 1px solid rgba(96, 165, 250, 0.4);
        flex-shrink: 0;
      }
      .rec-rank.gold {
        background: linear-gradient(
          145deg,
          rgba(245, 158, 11, 0.4),
          rgba(234, 88, 12, 0.3)
        );
        border-color: rgba(245, 158, 11, 0.5);
      }
      .rec-rank.silver {
        background: linear-gradient(
          145deg,
          rgba(148, 163, 184, 0.4),
          rgba(100, 116, 139, 0.3)
        );
        border-color: rgba(148, 163, 184, 0.5);
      }
      .rec-rank.bronze {
        background: linear-gradient(
          145deg,
          rgba(180, 120, 60, 0.4),
          rgba(146, 96, 44, 0.3)
        );
        border-color: rgba(180, 120, 60, 0.5);
      }
      .rec-degree-name {
        font-family: 'Poppins', sans-serif;
        font-size: 19px;
        font-weight: 700;
        color: #f3f8ff;
        margin-bottom: 4px;
        letter-spacing: -0.3px;
      }
      .rec-field-badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        background: rgba(59, 130, 246, 0.15);
        border: 1px solid rgba(59, 130, 246, 0.3);
        color: #93c5fd;
        margin-right: 8px;
      }
      .rec-meta-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
      }
      .match-bar-wrap {
        margin: 6px 0;
      }
      .match-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .match-label span:first-child {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .match-pct {
        font-family: 'Poppins', sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #60a5fa;
      }
      .match-pct.excellent {
        color: #10b981;
      }
      .match-pct.strong {
        color: #60a5fa;
      }
      .match-pct.good {
        color: #f59e0b;
      }
      .match-bar {
        height: 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      .match-bar-fill {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, #3b82f6, #22d3ee);
        transition: width 1s ease;
      }
      .match-bar-fill.excellent {
        background: linear-gradient(90deg, #10b981, #34d399);
      }
      .match-bar-fill.strong {
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
      }
      .match-bar-fill.good {
        background: linear-gradient(90deg, #f59e0b, #fcd34d);
      }
      .conf-badge {
        display: inline-flex;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.4px;
      }
      .conf-badge.excellent {
        background: rgba(16, 185, 129, 0.15);
        color: #6ee7b7;
        border: 1px solid rgba(16, 185, 129, 0.3);
      }
      .conf-badge.strong {
        background: rgba(59, 130, 246, 0.15);
        color: #93c5fd;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }
      .conf-badge.good {
        background: rgba(245, 158, 11, 0.15);
        color: #fcd34d;
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .conf-badge.possible {
        background: rgba(148, 163, 184, 0.1);
        color: #cbd5e1;
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .why-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 10px 0;
      }
      .why-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 5px 11px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        color: #bfdbfe;
        border: 1px solid rgba(96, 165, 250, 0.28);
        background: rgba(37, 99, 235, 0.13);
      }
      .breakdown-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
        gap: 8px;
        margin-top: 8px;
      }
      .bd-item {
        text-align: center;
        padding: 8px 4px;
        border-radius: 8px;
        background: rgba(148, 163, 184, 0.06);
        border: 1px solid rgba(148, 163, 184, 0.1);
      }
      .bd-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 4px;
      }
      .bd-val {
        font-family: 'Poppins', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: #93c5fd;
      }
      .uni-section {
        margin-top: 12px;
        border-top: 1px solid rgba(148, 163, 184, 0.15);
        padding-top: 14px;
      }
      .section-lbl {
        font-family: 'Poppins', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 10px;
      }
      .uni-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        border-radius: 10px;
        background: rgba(148, 163, 184, 0.06);
        border: 1px solid rgba(148, 163, 184, 0.12);
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 8px;
      }
      .uni-name {
        font-weight: 700;
        font-size: 14px;
        color: #e2eeff;
      }
      .uni-loc {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .uni-meta {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .uni-fee {
        font-size: 12px;
        font-weight: 600;
        color: #fcd34d;
      }
      .badge-green {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(16, 185, 129, 0.15);
        color: #6ee7b7;
        border: 1px solid rgba(16, 185, 129, 0.3);
      }
      .badge-gray {
        font-size: 11px;
        font-weight: 600;
        color: #94a3b8;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.1);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .career-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
        justify-content: flex-start;
      }
      .career-chip {
        padding: 4px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        background: rgba(139, 92, 246, 0.12);
        color: #c4b5fd;
        border: 1px solid rgba(139, 92, 246, 0.25);
      }
      .course-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
        justify-content: flex-start;
      }
      .course-card {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        background: rgba(59, 130, 246, 0.12);
        color: #bfdbfe;
        border: 1px solid rgba(96, 165, 250, 0.3);
        min-width: 160px;
      }
      .course-card .course-meta {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #93c5fd;
      }
      .course-card .course-reason {
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
      }
      .salary-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(16, 185, 129, 0.12);
        color: #6ee7b7;
        border: 1px solid rgba(16, 185, 129, 0.25);
        margin-top: 8px;
      }
      .rec-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 6px;
      }
      .btn-unenroll {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fecaca;
      }
      .btn-unenroll:hover {
        background: rgba(239, 68, 68, 0.2);
      }
      .nav-toggle {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        cursor: pointer;
        padding: 8px;
      }
      .nav-toggle span {
        display: block;
        width: 20px;
        height: 2px;
        background: #f1f5f9;
        border-radius: 2px;
        transition: all 0.3s;
      }
      .nav-toggle.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-toggle.open span:nth-child(2) {
        opacity: 0;
      }
      .nav-toggle.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }
      @media (max-width: 768px) {
        .navbar {
          flex-wrap: wrap;
          height: auto !important;
          padding: 14px 20px !important;
        }
        .nav-toggle {
          display: flex;
        }
        .nav-links {
          display: none;
          flex-direction: column;
          width: 100%;
          gap: 4px !important;
          padding: 12px 0 4px;
        }
        .nav-links.open {
          display: flex;
        }
        .navbar .nav-links a,
        .navbar .nav-links .btn-logout {
          width: 100%;
          padding: 10px 14px !important;
          border-radius: 8px !important;
          font-size: 14px !important;
        }
        .navbar .nav-name {
          width: 100%;
          padding: 6px 14px;
          font-size: 13px;
          color: #94a3b8;
        }
        .breakdown-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .rec-body {
          grid-template-columns: 1fr;
        }
        .rec-side {
          order: 2;
        }
        .rec-main {
          order: 1;
        }
        .rec-degree-name {
          font-size: 16px;
        }
        .match-pct {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body class="page-recommendations">
    <div class="navbar">
      <span class="logo">Degree Recommender</span>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <span id="navName" class="nav-name"></span>
        <a href="dashboard.html">Dashboard</a>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard content-stack">
      <div class="page-header">
        <h1>Degree Recommendations</h1>
        <p class="subtitle" id="subtitleMsg">Analyzing your profile...</p>
      </div>

      <section class="glass-panel rec-summary-panel">
        <div class="summary-grid">
          <div class="summary-item summary-career">
            <label>Career Goal</label>
            <p id="careerGoal">-</p>
          </div>
          <div class="summary-item">
            <label>Interest Areas</label>
            <div id="interestTags" class="tag-list"></div>
          </div>
          <div class="summary-item">
            <label>Degrees Analyzed</label>
            <p id="totalAnalyzed">-</p>
          </div>
        </div>
      </section>

      <section class="glass-panel rec-results-panel">
        <h2>Best Degrees For You</h2>
        <div id="recommendationsList">
          <div class="loading-box">
            <div class="loading-emoji">...</div>
            <p>Analyzing your academic profile...</p>
          </div>
        </div>
      </section>
    </div>

    <script>
      const API = window.APP_CONFIG.API_BASE_URL
      const token = localStorage.getItem('token')
      if (!token) window.location.href = 'login.html'
      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }
      document.getElementById('navName').textContent =
        localStorage.getItem('studentName') || ''

      function toggleNav() {
        document.getElementById('navLinks').classList.toggle('open')
        document.querySelector('.nav-toggle').classList.toggle('open')
      }
      function getMatchClass(p) {
        return p >= 80
          ? 'excellent'
          : p >= 65
            ? 'strong'
            : p >= 50
              ? 'good'
              : ''
      }
      function getConfClass(l) {
        if (l === 'Excellent Match') return 'excellent'
        if (l === 'Strong Match') return 'strong'
        if (l === 'Good Match') return 'good'
        return 'possible'
      }
      function getRankClass(r) {
        return r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : ''
      }

      function formatBreakdownValue(value, fallback) {
        if (!value) return fallback

        const match = String(value).match(/^([+-]?\d+(?:\.\d+)?)(\/\d+)$/)
        if (!match) return escapeHtml(value)

        const score = Number(match[1])
        const suffix = match[2]
        const rounded = Number.isInteger(score) ? score : Number(score.toFixed(1))
        const prefix = score >= 0 && String(match[1]).startsWith('+') ? '+' : ''

        return `${prefix}${rounded}${suffix}`
      }

      const state = {
        likedDegrees: new Set(),
        dislikedDegrees: new Set(),
        maxEnrollments: 2,
        enrolledDegreeIds: new Set(),
      }

      function escapeHtml(value) {
        if (value === null || value === undefined) return ''
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      async function loadFeedbackState() {
        const res = await fetch(`${API}/preferences`, { headers })
        if (!res.ok) return
        const pref = await res.json()
        state.likedDegrees = new Set((pref.likedDegrees || []).map((id) => String(id)))
        state.dislikedDegrees = new Set(
          (pref.dislikedDegrees || []).map((id) => String(id)),
        )
      }

      async function loadEnrollmentState() {
        const res = await fetch(`${API}/degree-enrollments`, { headers })
        if (!res.ok) return
        const data = await res.json()
        state.maxEnrollments = data.maxAllowed || 2
        state.enrolledDegreeIds = new Set(
          (data.enrollments || []).map((e) => String(e.degree?._id || e.degree)),
        )
      }

      async function setDegreeFeedback(degreeId, action) {
        const res = await fetch(`${API}/preferences/degree-feedback`, {
          method: 'POST',
          headers,
          body: JSON.stringify({ degreeId, action }),
        })
        const data = await res.json()
        if (!res.ok) {
          showAppAlert(data.message || 'Could not update feedback', 'error')
          return
        }
        state.likedDegrees = new Set((data.likedDegrees || []).map((id) => String(id)))
        state.dislikedDegrees = new Set(
          (data.dislikedDegrees || []).map((id) => String(id)),
        )
        await render()
        const messages = {
          like: 'Degree liked successfully.',
          dislike: 'Degree disliked successfully.',
          clear: 'Degree feedback cleared.',
        }
        showAppAlert(messages[action] || 'Feedback updated successfully.', 'success')
      }

      async function enrollDegree(degreeId) {
        const res = await fetch(`${API}/degree-enrollments/${degreeId}`, {
          method: 'POST',
          headers,
        })
        const data = await res.json()
        if (!res.ok) {
          showAppAlert(data.message || 'Could not enroll', 'error')
          return
        }
        await loadEnrollmentState()
        await render()
        showAppAlert(
          data.message || 'Degree enrolled successfully.',
          'success',
        )
      }

      async function unenrollDegree(degreeId) {
        const res = await fetch(`${API}/degree-enrollments/${degreeId}`, {
          method: 'DELETE',
          headers,
        })
        const data = await res.json()
        if (!res.ok) {
          showAppAlert(data.message || 'Could not unenroll', 'error')
          return
        }
        await loadEnrollmentState()
        await render()
        showAppAlert(
          data.message || 'Degree unenrolled successfully.',
          'success',
        )
      }

      async function render() {
        const res = await fetch(`${API}/recommendations`, { headers })
        const data = await res.json()

        document.getElementById('subtitleMsg').textContent =
          `Personalized degree recommendations for ${data.student}`
        document.getElementById('careerGoal').textContent =
          data.careerGoal || 'Not specified'
        document.getElementById('totalAnalyzed').textContent =
          `${data.totalDegreesAnalyzed} degrees`

        const tagsEl = document.getElementById('interestTags')
        tagsEl.innerHTML = ''
        ;(data.interestAreas || []).forEach((a) => {
          tagsEl.innerHTML += `<span class="tag">${escapeHtml(a)}</span>`
        })

        const list = document.getElementById('recommendationsList')
        if (!data.recommendations || data.recommendations.length === 0) {
          list.innerHTML =
            '<div class="empty-text"><p>No degree recommendations yet. Admin needs to add degrees to the system.</p></div>'
          return
        }

        list.innerHTML = data.recommendations
          .map((rec) => {
            const mc = getMatchClass(rec.matchPercentage)
            const cc = getConfClass(rec.confidenceLabel)
            const rc = getRankClass(rec.rank)
            const bd = rec.breakdown || {}

            const degreeId = String(rec.degreeId)
            const isLiked = state.likedDegrees.has(degreeId)
            const isDisliked = state.dislikedDegrees.has(degreeId)
            const isEnrolled = state.enrolledDegreeIds.has(degreeId)
            const canEnroll =
              !isEnrolled && state.enrolledDegreeIds.size < state.maxEnrollments

            const whyTags = (rec.whyRecommended || [])
              .map((r) => `<span class="why-tag">${escapeHtml(r)}</span>`)
              .join('')

            const unis = (rec.universities || [])
              .slice(0, 4)
              .map(
                (u) =>
                  `<div class="uni-item"><div><p class="uni-name">${escapeHtml(u.name)}</p><p class="uni-loc">${escapeHtml(u.location)}</p></div><div class="uni-meta">${u.feePerYear ? `<span class="uni-fee">${escapeHtml(u.feePerYear)}/yr</span>` : ''} ${u.hasScholarship ? `<span class="badge-green">Scholarship</span>` : ''} ${u.admissionTest && u.admissionTest !== 'None' ? `<span class="badge-gray">${escapeHtml(u.admissionTest)}</span>` : ''}</div></div>`,
              )
              .join('')

        const careers = (rec.careerOutcomes || [])
          .slice(0, 5)
          .map((c) => `<span class="career-chip">${escapeHtml(c)}</span>`)
          .join('')
        const courses = (rec.majorCourses || [])
          .slice(0, 6)
          .map(
            (course) =>
              `<div class="course-card">
                <div>${escapeHtml(course.courseCode || '')} ${escapeHtml(
                course.title || '',
              )}</div>
                <div class="course-meta">${escapeHtml(course.category || 'core')}</div>
                <div class="course-reason">${escapeHtml(
                course.reason || 'Core course for this degree',
              )}</div>
              </div>`,
          )
          .join('')

            return `<div class="rec-card">
              <div class="rec-top">
                <div class="rec-header">
                <div class="rec-rank ${rc}">${rec.rank}</div>
                <div style="flex:1;min-width:0">
                  <p class="rec-degree-name">${escapeHtml(rec.name)}</p>
                  <div class="rec-meta-row">
                    <span class="rec-field-badge">${escapeHtml(rec.field)}</span>
                    <span style="font-size:12px;color:var(--text-muted)">${escapeHtml(rec.duration || '4 years')}</span>
                    <span class="conf-badge ${cc}">${escapeHtml(rec.confidenceLabel)}</span>
                  </div>
                </div>
              </div>
              <div class="match-bar-wrap">
                <div class="match-label"><span>Match Score</span><span class="match-pct ${mc}">${rec.matchPercentage}%</span></div>
                <div class="match-bar"><div class="match-bar-fill ${mc}" style="width:${rec.matchPercentage}%"></div></div>
              </div>
              ${whyTags ? `<div class="why-list">${whyTags}</div>` : ''}
              </div>
              <div class="rec-body">
                <div class="rec-main">
                  <div style="margin-top:6px">
                    <p class="section-lbl">Career Outcomes</p>
                    <div class="career-chips">${careers}</div>
                    ${rec.expectedSalary ? `<div class="salary-badge">${escapeHtml(rec.expectedSalary)}</div>` : ''}
                  </div>
                  ${courses ? `<div style="margin-top:8px">
                    <p class="section-lbl">Major Courses</p>
                    <div class="course-chips">${courses}</div>
                  </div>` : ''}
                  ${unis ? `<div class="uni-section"><p class="section-lbl">Top Universities in Pakistan</p>${unis}</div>` : ''}
                </div>
                <div class="rec-side">
                  <div class="breakdown-grid">
                    <div class="bd-item"><p class="bd-label">Academic</p><p class="bd-val">${formatBreakdownValue(bd.academic, '-')}</p></div>
                    <div class="bd-item"><p class="bd-label">Interests</p><p class="bd-val">${formatBreakdownValue(bd.interests, '-')}</p></div>
                    <div class="bd-item"><p class="bd-label">Skills</p><p class="bd-val">${formatBreakdownValue(bd.skills, '-')}</p></div>
                    <div class="bd-item"><p class="bd-label">Career</p><p class="bd-val">${formatBreakdownValue(bd.career, '-')}</p></div>
                    <div class="bd-item"><p class="bd-label">Budget</p><p class="bd-val">${formatBreakdownValue(bd.constraints, '-')}</p></div>
                    <div class="bd-item"><p class="bd-label">Feedback</p><p class="bd-val">${formatBreakdownValue(bd.feedback, '+0/20')}</p></div>
                  </div>
                  <div class="rec-actions">
                    <button class="btn-like ${isLiked ? 'selected' : ''}" onclick="setDegreeFeedback('${degreeId}','like')">Like</button>
                    <button class="btn-dislike ${isDisliked ? 'selected' : ''}" onclick="setDegreeFeedback('${degreeId}','dislike')">Dislike</button>
                    ${
                      isEnrolled
                        ? `<button class="btn-enroll" disabled>Enrolled</button>
                           <button class="btn-unenroll" onclick="unenrollDegree('${degreeId}')">Unenroll</button>`
                        : `<button class="btn-enroll" ${canEnroll ? '' : 'disabled'} onclick="enrollDegree('${degreeId}')">${canEnroll ? 'Enroll Degree' : 'Limit Reached'}</button>`
                    }
                    <span class="enroll-count">Enrollments: ${state.enrolledDegreeIds.size}/${state.maxEnrollments}</span>
                  </div>
                </div>
              </div>
            </div>`
          })
          .join('')
      }

      window.onload = async () => {
        try {
          await loadFeedbackState()
          await loadEnrollmentState()
          await render()
        } catch (e) {
          document.getElementById('recommendationsList').innerHTML =
            '<p class="error-text">Error loading recommendations. Please try again.</p>'
        }
      }
      function logout() {
        localStorage.removeItem('token')
        localStorage.removeItem('studentName')
        localStorage.removeItem('studentId')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
