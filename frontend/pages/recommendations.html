<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recommendations - Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="page-recommendations">
    <div class="navbar">
      <span class="logo">Course Recommender</span>
      <div class="nav-links">
        <span id="navName" class="nav-name"></span>
        <a href="dashboard.html">Dashboard</a>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard content-stack">
      <div class="page-header">
        <h1>AI Course Recommendations</h1>
        <p class="subtitle" id="subtitleMsg">Analyzing your profile...</p>
      </div>

      <section class="glass-panel rec-summary-panel">
        <div class="summary-grid">
          <div class="summary-item summary-career">
            <label>Career Goal</label>
            <p id="careerGoal">-</p>
          </div>
          <div class="summary-item">
            <label>Interests</label>
            <div id="interestTags" class="tag-list"></div>
          </div>
          <div class="summary-item">
            <label>Courses Analyzed</label>
            <p id="totalAnalyzed">-</p>
          </div>
        </div>
      </section>

      <section class="glass-panel rec-results-panel">
        <h2>Recommended For You</h2>
        <div id="recommendationsList">
          <p class="empty-text">Loading recommendations...</p>
        </div>
      </section>
    </div>

    <script>
      const API = 'YOUR_NEW_URL/api'
      const token = localStorage.getItem('token')

      if (!token) {
        window.location.href = 'login.html'
      }

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      document.getElementById('navName').textContent =
        localStorage.getItem('studentName')

      window.onload = async () => {
        await loadRecommendations()
      }

      function difficultyClass(value) {
        if (value === 'beginner') return 'diff-beginner'
        if (value === 'intermediate') return 'diff-intermediate'
        return 'diff-advanced'
      }

      function difficultyLabel(value) {
        return (value || '').charAt(0).toUpperCase() + (value || '').slice(1)
      }

      async function loadRecommendations() {
        document.getElementById('recommendationsList').innerHTML = `
          <div class="loading-box">
            <div class="loading-emoji">AI</div>
            <p>Analyzing your profile...</p>
          </div>
        `

        try {
          const res = await fetch(`${API}/recommendations`, { headers })
          const data = await res.json()

          document.getElementById('subtitleMsg').textContent =
            `Personalized recommendations for ${data.student}`
          document.getElementById('careerGoal').textContent = data.careerGoal
          document.getElementById('totalAnalyzed').textContent =
            `${data.totalCoursesAnalyzed} courses`

          const tagsDiv = document.getElementById('interestTags')
          tagsDiv.innerHTML = ''
          const interests = data.interests || []
          interests.forEach((interest) => {
            tagsDiv.innerHTML += `<span class="tag">${interest}</span>`
          })

          const list = document.getElementById('recommendationsList')

          if (data.recommendations.length === 0) {
            list.innerHTML = `
              <p class="empty-text">
                No recommendations available yet. Update your profile with interests and career goals.
              </p>
            `
            return
          }

          list.innerHTML = ''
          data.recommendations.forEach((rec) => {
            const medal =
              rec.rank === 1
                ? '1'
                : rec.rank === 2
                  ? '2'
                  : rec.rank === 3
                    ? '3'
                    : `#${rec.rank}`

            const reasonTags = (rec.whyRecommended || [])
              .map((reason) => `<span class="reason-tag">${reason}</span>`)
              .join('')

            list.innerHTML += `
              <div class="rec-card">
                <div class="rank">${medal}</div>
                <div class="course-info">
                  <h3>${rec.title}</h3>
                  <div class="course-meta">
                    <span><strong>${rec.courseCode}</strong></span>
                    <span class="${difficultyClass(rec.difficulty)}">${difficultyLabel(rec.difficulty)}</span>
                    <span>Rating ${rec.rating}/5</span>
                    <span>Success ${rec.successRate}%</span>
                    <span>Probability ${rec.successProbability}%</span>
                  </div>
                  <div class="reasons">${reasonTags}</div>
                </div>
                <div class="actions">
                  <div class="score-badge">Score ${rec.score}</div>
                  <button class="btn-enroll" onclick="enrollCourse('${rec.courseCode}')">Enroll</button>
                  <div class="feedback-btns">
                    <button
                      class="btn-like"
                      onclick="sendFeedback('${rec.courseCode}', 'like')"
                      id="like-${rec.courseCode}"
                    >
                      Like
                    </button>
                    <button
                      class="btn-dislike"
                      onclick="sendFeedback('${rec.courseCode}', 'dislike')"
                      id="dislike-${rec.courseCode}"
                    >
                      Dislike
                    </button>
                  </div>
                </div>
              </div>
            `
          })
        } catch (error) {
          document.getElementById('recommendationsList').innerHTML =
            '<p class="error-text">Error loading recommendations. Make sure backend is running.</p>'
        }
      }

      async function enrollCourse(courseCode) {
        const coursesRes = await fetch(`${API}/courses`, { headers })
        const courses = await coursesRes.json()
        const course = courses.find((c) => c.courseCode === courseCode)

        if (!course) return alert('Course not found.')

        const res = await fetch(`${API}/enrollments`, {
          method: 'POST',
          headers,
          body: JSON.stringify({
            courseId: course._id,
            semester: 5,
            academicYear: '2025-2026',
          }),
        })

        const data = await res.json()

        if (res.ok) {
          alert(`Successfully enrolled in ${course.title}.`)
          loadRecommendations()
        } else {
          alert(data.message)
        }
      }

      async function sendFeedback(courseCode, type) {
        const coursesRes = await fetch(`${API}/courses`, { headers })
        const courses = await coursesRes.json()
        const course = courses.find((c) => c.courseCode === courseCode)
        if (!course) return

        const prefRes = await fetch(`${API}/preferences`, { headers })

        let res
        if (prefRes.ok) {
          const pref = await prefRes.json()

          let likedCourses = pref.likedCourses || []
          let dislikedCourses = pref.dislikedCourses || []

          if (type === 'like') {
            if (!likedCourses.includes(course._id)) {
              likedCourses.push(course._id)
            }
            dislikedCourses = dislikedCourses.filter((id) => id !== course._id)
          } else {
            if (!dislikedCourses.includes(course._id)) {
              dislikedCourses.push(course._id)
            }
            likedCourses = likedCourses.filter((id) => id !== course._id)
          }

          res = await fetch(`${API}/preferences`, {
            method: 'PUT',
            headers,
            body: JSON.stringify({ likedCourses, dislikedCourses }),
          })
        } else {
          res = await fetch(`${API}/preferences`, {
            method: 'POST',
            headers,
            body: JSON.stringify({
              likedCourses: type === 'like' ? [course._id] : [],
              dislikedCourses: type === 'dislike' ? [course._id] : [],
            }),
          })
        }

        if (res.ok) {
          const likeBtn = document.getElementById(`like-${courseCode}`)
          const dislikeBtn = document.getElementById(`dislike-${courseCode}`)

          if (type === 'like') {
            likeBtn.textContent = 'Liked'
            dislikeBtn.textContent = 'Dislike'
          } else {
            dislikeBtn.textContent = 'Disliked'
            likeBtn.textContent = 'Like'
          }

          setTimeout(() => {
            loadRecommendations()
          }, 1000)
        }
      }

      function logout() {
        localStorage.removeItem('token')
        localStorage.removeItem('studentName')
        localStorage.removeItem('studentId')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
