<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .nav-toggle {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        cursor: pointer;
        padding: 8px;
        z-index: 200;
      }
      .nav-toggle span {
        display: block;
        width: 20px;
        height: 2px;
        background: #f1f5f9;
        border-radius: 2px;
        transition: all 0.3s ease;
      }
      .nav-toggle.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .nav-toggle.open span:nth-child(2) {
        opacity: 0;
      }
      .nav-toggle.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }
      @media (max-width: 768px) {
        .navbar {
          flex-wrap: wrap;
          height: auto !important;
          padding: 14px 20px !important;
          gap: 0;
          position: relative;
        }
        .nav-toggle {
          display: flex;
        }
        .nav-links {
          display: none;
          flex-direction: column;
          width: 100%;
          gap: 4px !important;
          padding: 12px 0 4px;
          align-items: flex-start !important;
          flex-wrap: nowrap !important;
          justify-content: flex-start !important;
        }
        .nav-links.open {
          display: flex;
        }
        .navbar .nav-links a,
        .navbar .nav-links .btn-logout {
          width: 100%;
          padding: 10px 14px !important;
          border-radius: 8px !important;
          font-size: 14px !important;
        }
        .navbar .nav-name {
          width: 100%;
          padding: 6px 14px;
          font-size: 13px;
          color: #94a3b8;
        }
      }
    </style>
  </head>
  <body class="page-admin page-admin-dashboard">
    <div class="navbar">
      <span class="logo">Admin Panel</span>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="admin-courses.html">Manage Courses</a>
        <a href="admin-students.html">View Students</a>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard content-stack">
      <div class="page-header">
        <h1>Admin Dashboard</h1>
        <p class="subtitle">System overview and management</p>
      </div>

      <div class="cards-grid">
        <div class="card">
          <div class="card-icon">Courses</div>
          <h3 id="totalCourses">0</h3>
          <p>Total Courses</p>
        </div>
        <div class="card">
          <div class="card-icon">Students</div>
          <h3 id="totalStudents">0</h3>
          <p>Total Students</p>
        </div>
        <div class="card">
          <div class="card-icon">Enrollments</div>
          <h3 id="totalEnrollments">0</h3>
          <p>Total Enrollments</p>
        </div>
      </div>

      <section class="glass-panel admin-quick-actions">
        <h2>Quick Actions</h2>
        <div class="button-row">
          <a href="admin-courses.html" class="action-link">Add New Course</a>
          <a
            href="admin-students.html"
            class="action-link action-link-secondary"
          >
            View All Students
          </a>
        </div>
      </section>
    </div>

    <script>
      const API =
        'https://courserecommendationsystem-production-74ab.up.railway.app/api'
      const token = localStorage.getItem('token')

      if (!token) window.location.href = 'login.html'

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      window.onload = async () => {
        const coursesRes = await fetch(`${API}/courses`, { headers })
        const courses = await coursesRes.json()
        document.getElementById('totalCourses').textContent = courses.length

        const studentsRes = await fetch(`${API}/admin/students`, { headers })
        const students = await studentsRes.json()
        document.getElementById('totalStudents').textContent = students.length

        const enrollRes = await fetch(`${API}/admin/enrollments`, { headers })
        const enrollments = await enrollRes.json()
        document.getElementById('totalEnrollments').textContent =
          enrollments.length
      }

      function toggleNav() {
        const nav = document.getElementById('navLinks')
        const btn = document.querySelector('.nav-toggle')
        nav.classList.toggle('open')
        btn.classList.toggle('open')
      }
      // Close nav when clicking outside
      document.addEventListener('click', function (e) {
        const nav = document.getElementById('navLinks')
        const btn = document.querySelector('.nav-toggle')
        if (nav && btn && !nav.contains(e.target) && !btn.contains(e.target)) {
          nav.classList.remove('open')
          btn.classList.remove('open')
        }
      })

      function logout() {
        localStorage.removeItem('token')
        localStorage.removeItem('studentName')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
