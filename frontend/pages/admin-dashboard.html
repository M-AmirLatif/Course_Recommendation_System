<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard — Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <span class="logo">⚙️ Admin Panel</span>
      <div>
        <a href="admin-courses.html">Manage Courses</a>
        <a href="admin-students.html">View Students</a>
        <a href="#" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard">
      <h1>Admin Dashboard</h1>
      <p class="subtitle">System overview and management</p>

      <!-- STATS -->
      <div class="cards-grid">
        <div class="card">
          <div class="card-icon">📚</div>
          <h3 id="totalCourses">0</h3>
          <p>Total Courses</p>
        </div>
        <div class="card">
          <div class="card-icon">👨‍🎓</div>
          <h3 id="totalStudents">0</h3>
          <p>Total Students</p>
        </div>
        <div class="card">
          <div class="card-icon">✅</div>
          <h3 id="totalEnrollments">0</h3>
          <p>Total Enrollments</p>
        </div>
      </div>

      <!-- QUICK ACTIONS -->
      <div
        style="
          background: white;
          padding: 25px;
          border-radius: 12px;
          box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
        "
      >
        <h2 style="margin-bottom: 20px; color: #1a1a2e">Quick Actions</h2>
        <div style="display: flex; gap: 15px; flex-wrap: wrap">
          <a
            href="admin-courses.html"
            style="
              background: #e94560;
              color: white;
              padding: 12px 25px;
              border-radius: 8px;
              text-decoration: none;
              font-weight: 600;
            "
          >
            + Add New Course
          </a>
          <a
            href="admin-students.html"
            style="
              background: #1a1a2e;
              color: white;
              padding: 12px 25px;
              border-radius: 8px;
              text-decoration: none;
              font-weight: 600;
            "
          >
            👨‍🎓 View All Students
          </a>
        </div>
      </div>
    </div>

    <script>
      const API = 'http://localhost:5000/api'
      const token = localStorage.getItem('token')

      if (!token) window.location.href = 'login.html'

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      window.onload = async () => {
        // Load courses count
        const coursesRes = await fetch(`${API}/courses`, { headers })
        const courses = await coursesRes.json()
        document.getElementById('totalCourses').textContent = courses.length

        // Load students count
        const studentsRes = await fetch(`${API}/admin/students`, { headers })
        const students = await studentsRes.json()
        document.getElementById('totalStudents').textContent = students.length

        // Load enrollments count
        const enrollRes = await fetch(`${API}/admin/enrollments`, { headers })
        const enrollments = await enrollRes.json()
        document.getElementById('totalEnrollments').textContent =
          enrollments.length
      }

      function logout() {
        localStorage.removeItem('token')
        localStorage.removeItem('studentName')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
