<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="page-admin page-admin-dashboard">
    <div class="navbar">
      <span class="logo">Admin Panel</span>
      <div class="nav-links">
        <a href="admin-courses.html">Manage Courses</a>
        <a href="admin-students.html">View Students</a>
        <a href="#" class="btn-logout" onclick="logout()">Logout</a>
      </div>
    </div>

    <div class="dashboard content-stack">
      <div class="page-header">
        <h1>Admin Dashboard</h1>
        <p class="subtitle">System overview and management</p>
      </div>

      <div class="cards-grid">
        <div class="card">
          <div class="card-icon">Courses</div>
          <h3 id="totalCourses">0</h3>
          <p>Total Courses</p>
        </div>
        <div class="card">
          <div class="card-icon">Students</div>
          <h3 id="totalStudents">0</h3>
          <p>Total Students</p>
        </div>
        <div class="card">
          <div class="card-icon">Enrollments</div>
          <h3 id="totalEnrollments">0</h3>
          <p>Total Enrollments</p>
        </div>
      </div>

      <section class="glass-panel admin-quick-actions">
        <h2>Quick Actions</h2>
        <div class="button-row">
          <a href="admin-courses.html" class="action-link">Add New Course</a>
          <a
            href="admin-students.html"
            class="action-link action-link-secondary"
          >
            View All Students
          </a>
        </div>
      </section>
    </div>

    <script>
      const API = 'http://localhost:5000/api'
      const token = localStorage.getItem('token')

      if (!token) window.location.href = 'login.html'

      const headers = {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
      }

      window.onload = async () => {
        const coursesRes = await fetch(`${API}/courses`, { headers })
        const courses = await coursesRes.json()
        document.getElementById('totalCourses').textContent = courses.length

        const studentsRes = await fetch(`${API}/admin/students`, { headers })
        const students = await studentsRes.json()
        document.getElementById('totalStudents').textContent = students.length

        const enrollRes = await fetch(`${API}/admin/enrollments`, { headers })
        const enrollments = await enrollRes.json()
        document.getElementById('totalEnrollments').textContent =
          enrollments.length
      }

      function logout() {
        localStorage.removeItem('token')
        localStorage.removeItem('studentName')
        window.location.href = 'login.html'
      }
    </script>
  </body>
</html>
