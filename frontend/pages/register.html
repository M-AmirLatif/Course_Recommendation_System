<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="page-auth page-register">
    <div class="auth-container">
      <div class="auth-box auth-box-wide">
        <div class="auth-logo">
          <div class="logo-icon">Course Recommender</div>
        </div>
        <h2>Create Your Account</h2>
        <p class="subtitle">
          Register to get personalized course recommendations
        </p>

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <div id="step1">
          <div class="form-grid form-grid-2">
            <div class="form-group">
              <label for="name">Full Name</label>
              <input type="text" id="name" placeholder="Ahmed Ali" />
            </div>
            <div class="form-group">
              <label for="studentId">Student ID</label>
              <input type="text" id="studentId" placeholder="CS-2021-001" />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="ahmed@university.com" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Minimum 6 characters"
            />
          </div>

          <div class="form-grid form-grid-2">
            <div class="form-group">
              <label for="department">Department</label>
              <select id="department">
                <option value="">Select Department</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Business">Business</option>
                <option value="Engineering">Engineering</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Design">Design</option>
              </select>
            </div>
            <div class="form-group">
              <label for="semester">Current Semester</label>
              <select id="semester">
                <option value="">Select Semester</option>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="skillLevel">Skill Level</label>
            <select id="skillLevel">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>

          <div class="form-group">
            <label for="careerGoal">Career Goal</label>
            <input
              type="text"
              id="careerGoal"
              placeholder="Software Engineer, Data Scientist, Product Designer"
            />
          </div>

          <div class="form-group register-interests">
            <label>Interests (select all that apply)</label>
            <div class="tag-list tag-list-spaced">
              <label class="interest-tag">
                <input type="checkbox" value="Machine Learning" />
                <span>Machine Learning</span>
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Web Development" />
                <span>Web Development</span>
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Data Science" />
                <span>Data Science</span>
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Cybersecurity" />
                <span>Cybersecurity</span>
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Mobile Development" />
                <span>Mobile Development</span>
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="AI" />
                <span>Artificial Intelligence</span>
              </label>
            </div>
          </div>

          <button class="btn btn-primary" onclick="register()">
            Create Account
          </button>

          <div class="auth-link">
            Already have an account? <a href="login.html">Login here</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = 'https://courserecommendationsystem-production-74ab.up.railway.app/api'

      if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html'
      }

      async function register() {
        const errorAlert = document.getElementById('errorAlert')
        const successAlert = document.getElementById('successAlert')

        errorAlert.style.display = 'none'
        successAlert.style.display = 'none'

        const name = document.getElementById('name').value.trim()
        const studentId = document.getElementById('studentId').value.trim()
        const email = document.getElementById('email').value.trim()
        const password = document.getElementById('password').value
        const department = document.getElementById('department').value
        const semester = document.getElementById('semester').value
        const skillLevel = document.getElementById('skillLevel').value
        const careerGoal = document.getElementById('careerGoal').value.trim()

        const interestCheckboxes = document.querySelectorAll(
          '.interest-tag input[type="checkbox"]:checked',
        )
        const interests = Array.from(interestCheckboxes).map((cb) => cb.value)

        if (
          !name ||
          !studentId ||
          !email ||
          !password ||
          !department ||
          !semester ||
          !careerGoal
        ) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Please fill in all fields.'
          return
        }

        if (password.length < 6) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Password must be at least 6 characters.'
          return
        }

        if (interests.length === 0) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Please select at least one interest.'
          return
        }

        try {
          const response = await fetch(`${API}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name,
              studentId,
              email,
              password,
              department,
              semester: parseInt(semester, 10),
              skillLevel,
              careerGoal,
              interests,
            }),
          })

          const data = await response.json()

          if (!response.ok) {
            errorAlert.style.display = 'block'
            errorAlert.textContent = data.message || 'Registration failed.'
            return
          }

          localStorage.setItem('token', data.token)
          localStorage.setItem('studentName', data.name)
          localStorage.setItem('studentId', data._id)

          successAlert.style.display = 'block'
          successAlert.textContent =
            'Account created successfully. Redirecting...'

          setTimeout(() => {
            window.location.href = 'dashboard.html'
          }, 1200)
        } catch (error) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Server error. Make sure backend is running.'
        }
      }
    </script>
  </body>
</html>
