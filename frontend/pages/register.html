<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Course Recommender</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box" style="max-width: 550px">
        <h2>🎓 Create Account</h2>
        <p class="subtitle">
          Register to get AI-powered course recommendations
        </p>

        <!-- Alerts -->
        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <!-- Step 1: Basic Info -->
        <div id="step1">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="name" placeholder="Ahmed Ali" />
            </div>
            <div class="form-group">
              <label>Student ID</label>
              <input type="text" id="studentId" placeholder="CS-2021-001" />
            </div>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="ahmed@university.com" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Min 6 characters"
            />
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px">
            <div class="form-group">
              <label>Department</label>
              <select id="department">
                <option value="">Select Department</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Business">Business</option>
                <option value="Engineering">Engineering</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Design">Design</option>
              </select>
            </div>
            <div class="form-group">
              <label>Current Semester</label>
              <select id="semester">
                <option value="">Select Semester</option>
                <option value="1">Semester 1</option>
                <option value="2">Semester 2</option>
                <option value="3">Semester 3</option>
                <option value="4">Semester 4</option>
                <option value="5">Semester 5</option>
                <option value="6">Semester 6</option>
                <option value="7">Semester 7</option>
                <option value="8">Semester 8</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Skill Level</label>
            <select id="skillLevel">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>

          <div class="form-group">
            <label>Career Goal</label>
            <input
              type="text"
              id="careerGoal"
              placeholder="e.g. Software Engineer, Data Scientist"
            />
          </div>

          <div class="form-group">
            <label>Interests (select all that apply)</label>
            <div
              style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px"
            >
              <label class="interest-tag">
                <input type="checkbox" value="Machine Learning" /> Machine
                Learning
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Web Development" /> Web
                Development
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Data Science" /> Data Science
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Cybersecurity" /> Cybersecurity
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="Mobile Development" /> Mobile
                Development
              </label>
              <label class="interest-tag">
                <input type="checkbox" value="AI" /> Artificial Intelligence
              </label>
            </div>
          </div>

          <button class="btn btn-primary" onclick="register()">
            Create Account
          </button>

          <div class="auth-link">
            Already have an account? <a href="login.html">Login here</a>
          </div>
        </div>
      </div>
    </div>

    <style>
      .interest-tag {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #f8f8f8;
        border: 2px solid #e0e0e0;
        padding: 8px 14px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.2s;
      }
      .interest-tag:hover {
        border-color: #e94560;
        background: #fff0f3;
      }
      .interest-tag input {
        width: auto;
        cursor: pointer;
      }
    </style>

    <script>
      const API = 'http://localhost:5000/api'

      // If already logged in → redirect
      if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html'
      }

      async function register() {
        const errorAlert = document.getElementById('errorAlert')
        const successAlert = document.getElementById('successAlert')

        // Hide alerts
        errorAlert.style.display = 'none'
        successAlert.style.display = 'none'

        // Get values
        const name = document.getElementById('name').value
        const studentId = document.getElementById('studentId').value
        const email = document.getElementById('email').value
        const password = document.getElementById('password').value
        const department = document.getElementById('department').value
        const semester = document.getElementById('semester').value
        const skillLevel = document.getElementById('skillLevel').value
        const careerGoal = document.getElementById('careerGoal').value

        // Get selected interests
        const interestCheckboxes = document.querySelectorAll(
          'input[type="checkbox"]:checked',
        )
        const interests = Array.from(interestCheckboxes).map((cb) => cb.value)

        // Validation
        if (
          !name ||
          !studentId ||
          !email ||
          !password ||
          !department ||
          !semester ||
          !careerGoal
        ) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Please fill in all fields'
          return
        }

        if (password.length < 6) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Password must be at least 6 characters'
          return
        }

        if (interests.length === 0) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Please select at least one interest'
          return
        }

        try {
          const response = await fetch(`${API}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name,
              studentId,
              email,
              password,
              department,
              semester: parseInt(semester),
              skillLevel,
              careerGoal,
              interests,
            }),
          })

          const data = await response.json()

          if (!response.ok) {
            errorAlert.style.display = 'block'
            errorAlert.textContent = data.message
            return
          }

          // Save token
          localStorage.setItem('token', data.token)
          localStorage.setItem('studentName', data.name)
          localStorage.setItem('studentId', data._id)

          // Show success then redirect
          successAlert.style.display = 'block'
          successAlert.textContent =
            'Account created successfully! Redirecting...'

          setTimeout(() => {
            window.location.href = 'dashboard.html'
          }, 1500)
        } catch (error) {
          errorAlert.style.display = 'block'
          errorAlert.textContent = 'Server error. Make sure backend is running.'
        }
      }
    </script>
  </body>
</html>
